<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OXLAB Snap Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-wrapper">
        <header>
            <h1>OX <span class="highlight">PUZZLE!</span></h1>
            <p>Drag the pieces to the grid!</p>
        </header>

        <div id="grid-container" class="grid"></div>

        <div id="pieces-tray" class="tray"></div>

        <div id="overlay" class="hidden">
            <div class="modal">
                <h2>CONGRATS, YOU GOT IT! :P</h2>
                <p>Show this to get your candy.</p>
                <button onclick="location.reload()">Reset Game</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
